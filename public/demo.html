<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustle Themes & Weather Demo</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --cell-correct: #3b82f6;
            --cell-present: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', ui-sans-serif, system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 40px 20px;
            transition: background 0.8s ease, color 0.5s ease;
        }

        /* --- WEATHER CONTAINER & PARTICLE LAYERS --- */
        #weather-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* 1. Crateria Rain */
        .rain-drop {
            width: 1.5px;
            height: 40px;
            background: linear-gradient(transparent, rgba(165, 243, 252, 0.6));
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(15deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(15deg); opacity: 0; }
        }

        /* 2. Norfair Embers */
        .ember {
            border-radius: 50%;
            background: radial-gradient(circle, #f97316 0%, #ef4444 60%, transparent 100%);
            box-shadow: 0 0 10px #f97316, 0 0 20px #ef4444;
            animation: rise-ember ease-in-out infinite;
        }
        @keyframes rise-ember {
            0% { transform: translateY(0) scale(0.6) translateX(0); opacity: 0; }
            10% { opacity: 0.9; }
            50% { transform: translateY(-50vh) scale(1.1) translateX(40px); }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh) scale(0.5) translateX(-40px); opacity: 0; }
        }

        /* 3. Maridia Bubbles */
        .bubble {
            border-radius: 50%;
            border: 1px solid rgba(45, 212, 191, 0.4);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15) 0%, rgba(45, 212, 191, 0.05) 70%, rgba(45, 212, 191, 0.2) 100%);
            box-shadow: inset 0 0 6px rgba(255, 255, 255, 0.2);
            animation: rise-bubble ease-in-out infinite;
        }
        @keyframes rise-bubble {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            50% { transform: translateY(-50vh) translateX(-20px) scale(1.05); }
            100% { transform: translateY(-110vh) translateX(20px) scale(0.9); opacity: 0; }
        }

        /* 4. Tourian Spores */
        .spore {
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
            animation: float-spore ease-in-out infinite;
        }
        @keyframes float-spore {
            0% { transform: translateY(-10vh) translateX(0) scale(0.7); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translateY(50vh) translateX(30px) scale(1); }
            90% { opacity: 0.6; }
            100% { transform: translateY(105vh) translateX(-30px) scale(0.8); opacity: 0; }
        }

        /* 5. Christmas Snow */
        .snowflake {
            border-radius: 50%;
            background: white;
            opacity: 0.8;
            animation: drift-snow linear infinite;
        }
        @keyframes drift-snow {
            0% { transform: translateY(-10px) translateX(0); }
            50% { transform: translateY(50vh) translateX(20px); }
            100% { transform: translateY(105vh) translateX(-20px); }
        }

        /* 6. Valentine Hearts */
        .heart-particle {
            font-size: 16px;
            user-select: none;
            animation: float-heart ease-in-out infinite;
        }
        @keyframes float-heart {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            15% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(15deg); opacity: 0; }
        }

        /* 7. Autumn Leaves (Thanksgiving) */
        .leaf-particle {
            font-size: 18px;
            user-select: none;
            animation: fall-leaf linear infinite;
        }
        @keyframes fall-leaf {
            0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translateY(50vh) rotate(180deg) translateX(40px); }
            100% { transform: translateY(105vh) rotate(360deg) translateX(-40px); opacity: 0; }
        }

        /* 8. Halloween Bats/Ghosts */
        .spooky-particle {
            font-size: 20px;
            user-select: none;
            animation: fly-spooky ease-in-out infinite;
        }
        @keyframes fly-spooky {
            0% { transform: translateY(-10vh) translateX(0) scale(0.8); opacity: 0; }
            15% { opacity: 0.8; }
            50% { transform: translateY(50vh) translateX(-50px) scale(1.2); }
            100% { transform: translateY(105vh) translateX(50px) scale(0.9); opacity: 0; }
        }

        /* 9. Celebration Confetti (New Year) */
        .confetti-particle {
            width: 8px;
            height: 12px;
            animation: drift-confetti linear infinite;
        }
        @keyframes drift-confetti {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0.2; }
        }

        /* 10. Star Sparkles (Independence) */
        .sparkle-particle {
            font-size: 14px;
            animation: fall-sparkle ease-in-out infinite;
        }
        @keyframes fall-sparkle {
            0% { transform: translateY(-5vh) scale(0.2); opacity: 0; }
            50% { opacity: 1; transform: translateY(50vh) scale(1.2); text-shadow: 0 0 8px gold; }
            100% { transform: translateY(105vh) scale(0.5); opacity: 0; }
        }

        /* 11. Brinstar Pollen */
        .pollen-particle {
            border-radius: 50%;
            background: #a3e635;
            box-shadow: 0 0 6px #a3e635;
            animation: drift-pollen ease-in-out infinite;
        }
        @keyframes drift-pollen {
            0% { transform: translateY(-5vh) translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: 0.9; }
            50% { transform: translateY(50vh) translateX(25px) scale(0.9); }
            100% { transform: translateY(105vh) translateX(-25px) scale(0.5); opacity: 0; }
        }

        /* 12. Wrecked Ship Wisps */
        .wisp-particle {
            border-radius: 50%;
            background: radial-gradient(circle, #06b6d4 0%, rgba(217, 70, 239, 0.4) 70%, transparent 100%);
            box-shadow: 0 0 8px #06b6d4, 0 0 16px #d946ef;
            animation: float-wisp ease-in-out infinite;
        }
        @keyframes float-wisp {
            0% { transform: translateY(0) scale(0.6) translateX(0); opacity: 0; }
            20% { opacity: 0.8; }
            50% { transform: translateY(-50vh) scale(1.1) translateX(-30px); }
            80% { opacity: 0.8; }
            100% { transform: translateY(-110vh) scale(0.4) translateX(30px); opacity: 0; }
        }

        /* --- UI OVERLAY --- */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background-color: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .section-title {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 20px 0 10px 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        /* --- GRID CONTROLS --- */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .controls-holidays {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-theme {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 6px;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .btn-theme span.emoji {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .btn-theme:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-theme:hover span.emoji {
            transform: scale(1.2);
        }

        .btn-theme.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.15) 0%, rgba(79, 70, 229, 0.05) 100%);
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* --- MODE SWITCHER (LIGHT/DARK) --- */
        .mode-toggle-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 16px;
            border-radius: 14px;
            margin-top: 12px;
            border: 1px solid var(--border-color);
        }

        .mode-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .switch-btn {
            background: var(--accent);
            border: none;
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .switch-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* --- PREVIEW GRID SIMULATION --- */
        .grid-sim {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 240px;
            margin: 24px auto 0 auto;
        }

        .cell-sim {
            aspect-ratio: 1;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.25);
            font-weight: 800;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.4s ease;
        }

        .cell-sim.correct { background-color: var(--cell-correct) !important; border-color: var(--cell-correct) !important; }
        .cell-sim.present { background-color: var(--cell-present) !important; border-color: var(--cell-present) !important; }

        /* --- STYLES FOR CORE THEMES --- */
        [data-theme="crateria"] {
            --bg-color: #0c0818;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --cell-correct: #3b82f6;
            --cell-present: #a855f7;
        }
        [data-theme="brinstar"] {
            --bg-color: #0c1a10;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --cell-correct: #10b981;
            --cell-present: #eab308;
        }
        [data-theme="norfair"] {
            --bg-color: #120301;
            --accent: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.3);
            --cell-correct: #ef4444;
            --cell-present: #f97316;
        }
        [data-theme="wrecked_ship"] {
            --bg-color: #0f091a;
            --accent: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.3);
            --cell-correct: #06b6d4;
            --cell-present: #d946ef;
        }
        [data-theme="maridia"] {
            --bg-color: #020f18;
            --accent: #2dd4bf;
            --accent-glow: rgba(45, 212, 191, 0.3);
            --cell-correct: #0ea5e9;
            --cell-present: #eab308;
        }
        [data-theme="tourian"] {
            --bg-color: #030a08;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.3);
            --cell-correct: #22c55e;
            --cell-present: #ef4444;
        }

        /* --- STYLES FOR HOLIDAYS --- */
        /* Christmas */
        [data-theme="christmas"] {
            --bg-color: #0b1a13; --text-color: #e2f5ee; --cell-correct: #ef4444; --cell-present: #f59e0b;
        }

        /* Halloween */
        [data-theme="halloween"] {
            --bg-color: #0b0713; --text-color: #f7ebff; --cell-correct: #f97316; --cell-present: #a855f7;
        }

        /* Valentine's */
        [data-theme="valentine"] {
            --bg-color: #1c0a10; --text-color: #ffe6ed; --cell-correct: #f43f5e; --cell-present: #ec4899;
        }

        /* St. Patrick's */
        [data-theme="stpatrick"] {
            --bg-color: #05140b; --text-color: #e6f7ed; --cell-correct: #22c55e; --cell-present: #eab308;
        }

        /* New Year's */
        [data-theme="newyear"] {
            --bg-color: #05060b; --text-color: #f1f3f7; --cell-correct: #eab308; --cell-present: #94a3b8;
        }

        /* Thanksgiving */
        [data-theme="thanksgiving"] {
            --bg-color: #1a0f0a; --text-color: #faebd7; --cell-correct: #ca8a04; --cell-present: #d97706;
        }

        /* Easter */
        [data-theme="easter"] {
            --bg-color: #141b24; --text-color: #e5f2ff; --cell-correct: #f472b6; --cell-present: #38bdf8;
        }

        /* Independence Day */
        [data-theme="independence"] {
            --bg-color: #050b14; --text-color: #f1f5f9; --cell-correct: #ef4444; --cell-present: #3b82f6;
        }

    </style>
</head>
<body data-theme="crateria">

    <!-- Background Weather Effects -->
    <div id="weather-container"></div>

    <!-- Interface Card -->
    <div class="wrapper">
        <div class="card">
            <h1>Rustle Themes Demo</h1>
            <p class="subtitle">Select a Planet or Holiday theme to see its colors and background animation overlays.</p>

            <div class="section-title">Metroid Planets</div>
            <div class="controls">
                <button class="btn-theme active" onclick="setTheme('crateria', 'rain')">
                    <span class="emoji">🌧️</span>
                    <span>Crateria (Rain)</span>
                </button>
                <button class="btn-theme" onclick="setTheme('brinstar', 'pollen')">
                    <span class="emoji">🌿</span>
                    <span>Brinstar (Pollen)</span>
                </button>
                <button class="btn-theme" onclick="setTheme('norfair', 'ember')">
                    <span class="emoji">🔥</span>
                    <span>Norfair (Embers)</span>
                </button>
                <button class="btn-theme" onclick="setTheme('wrecked_ship', 'wisp')">
                    <span class="emoji">👻</span>
                    <span>Wrecked Ship (Wisps)</span>
                </button>
                <button class="btn-theme" onclick="setTheme('maridia', 'bubble')">
                    <span class="emoji">🫧</span>
                    <span>Maridia (Bubbles)</span>
                </button>
                <button class="btn-theme" onclick="setTheme('tourian', 'spore')">
                    <span class="emoji">🦠</span>
                    <span>Tourian (Spores)</span>
                </button>
            </div>

            <div class="section-title">Holidays</div>
            <div class="controls-holidays">
                <button class="btn-theme" onclick="setHoliday('christmas', 'snowflake')">
                    <span class="emoji">🎄</span>
                    <span>Christmas</span>
                </button>
                <button class="btn-theme" onclick="setHoliday('halloween', 'spooky')">
                    <span class="emoji">🎃</span>
                    <span>Halloween</span>
                </button>
                <button class="btn-theme" onclick="setHoliday('valentine', 'heart')">
                    <span class="emoji">💖</span>
                    <span>Valentine's</span>
                </button>
                <button class="btn-theme" onclick="setHoliday('stpatrick', 'shamrock')">
                    <span class="emoji">🍀</span>
                    <span>St. Patrick's</span>
                </button>
                <button class="btn-theme" onclick="setHoliday('newyear', 'confetti')">
                    <span class="emoji">🎉</span>
                    <span>New Year</span>
                </button>
                <button class="btn-theme" onclick="setHoliday('thanksgiving', 'leaf')">
                    <span class="emoji">🦃</span>
                    <span>Thanksgiving</span>
                </button>
                <button class="btn-theme" onclick="setHoliday('easter', 'easteregg')">
                    <span class="emoji">🥚</span>
                    <span>Easter</span>
                </button>
                <button class="btn-theme" onclick="setHoliday('independence', 'sparkle')">
                    <span class="emoji">💥</span>
                    <span>4th of July</span>
                </button>
            </div>



            <!-- Simulated Grid -->
            <div class="grid-sim">
                <div class="cell-sim correct">P</div>
                <div class="cell-sim correct">L</div>
                <div class="cell-sim present">A</div>
                <div class="cell-sim">N</div>
                <div class="cell-sim">T</div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('weather-container');
        let currentEffect = 'rain';
        let currentHolidayPrefix = '';
        let isLightMode = false;
        let spawnInterval = null;

        function setTheme(theme, effect) {
            document.body.setAttribute('data-theme', theme);
            currentEffect = effect;
            currentHolidayPrefix = '';
            
            updateActiveButton();
            clearParticles();
            startSpawning();
        }

        function setHoliday(prefix, effect) {
            document.body.setAttribute('data-theme', prefix);
            currentHolidayPrefix = prefix;
            currentEffect = effect;
            
            updateActiveButton();
            clearParticles();
            startSpawning();
        }

        function updateActiveButton() {
            const buttons = document.querySelectorAll('.btn-theme');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function clearParticles() {
            container.innerHTML = '';
            if (spawnInterval) {
                clearInterval(spawnInterval);
            }
        }

        function createParticle() {
            const p = document.createElement('div');
            
            if (currentEffect === 'rain') {
                p.className = 'particle rain-drop';
                p.style.left = `${Math.random() * 110 - 5}%`;
                p.style.top = `-50px`;
                p.style.animationDuration = `${0.6 + Math.random() * 0.4}s`;
            } else if (currentEffect === 'ember') {
                p.className = 'particle ember';
                const diam = 4 + Math.random() * 8;
                p.style.width = `${diam}px`;
                p.style.height = `${diam}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.bottom = `-20px`;
                p.style.animationDuration = `${3 + Math.random() * 3}s`;
            } else if (currentEffect === 'bubble') {
                p.className = 'particle bubble';
                const diam = 8 + Math.random() * 16;
                p.style.width = `${diam}px`;
                p.style.height = `${diam}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.bottom = `-30px`;
                p.style.animationDuration = `${4 + Math.random() * 4}s`;
            } else if (currentEffect === 'spore') {
                p.className = 'particle spore';
                const diam = 6 + Math.random() * 10;
                p.style.width = `${diam}px`;
                p.style.height = `${diam}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-20px`;
                p.style.animationDuration = `${5 + Math.random() * 5}s`;
            } else if (currentEffect === 'snowflake') {
                p.className = 'particle snowflake';
                const diam = 3 + Math.random() * 6;
                p.style.width = `${diam}px`;
                p.style.height = `${diam}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-10px`;
                p.style.animationDuration = `${4 + Math.random() * 5}s`;
            } else if (currentEffect === 'heart') {
                p.className = 'particle heart-particle';
                p.innerText = Math.random() > 0.5 ? '💖' : '❤️';
                p.style.left = `${Math.random() * 100}%`;
                p.style.bottom = `-20px`;
                p.style.animationDuration = `${3 + Math.random() * 3}s`;
            } else if (currentEffect === 'shamrock') {
                p.className = 'particle leaf-particle';
                p.innerText = Math.random() > 0.5 ? '🍀' : '☘️';
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-30px`;
                p.style.animationDuration = `${4 + Math.random() * 4}s`;
            } else if (currentEffect === 'leaf') {
                p.className = 'particle leaf-particle';
                const leaves = ['🍂', '🍁', '🍃'];
                p.innerText = leaves[Math.floor(Math.random() * leaves.length)];
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-30px`;
                p.style.animationDuration = `${5 + Math.random() * 5}s`;
            } else if (currentEffect === 'spooky') {
                p.className = 'particle spooky-particle';
                const symbols = ['👻', '🦇', '🎃', '🕷️'];
                p.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-30px`;
                p.style.animationDuration = `${6 + Math.random() * 4}s`;
            } else if (currentEffect === 'confetti') {
                p.className = 'particle confetti-particle';
                const colors = ['#f59e0b', '#ef4444', '#3b82f6', '#10b981', '#ec4899', '#a855f7'];
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-15px`;
                p.style.animationDuration = `${2 + Math.random() * 3}s`;
            } else if (currentEffect === 'easteregg') {
                p.className = 'particle spooky-particle'; // reuse same keyframe logic
                const symbols = ['🥚', '🌸', '🐰', '🌷'];
                p.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-30px`;
                p.style.animationDuration = `${5 + Math.random() * 4}s`;
            } else if (currentEffect === 'sparkle') {
                p.className = 'particle sparkle-particle';
                p.innerText = '✨';
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-20px`;
                p.style.animationDuration = `${3 + Math.random() * 2}s`;
            } else if (currentEffect === 'pollen') {
                p.className = 'particle pollen-particle';
                const diam = 3 + Math.random() * 4;
                p.style.width = `${diam}px`;
                p.style.height = `${diam}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `-20px`;
                p.style.animationDuration = `${4 + Math.random() * 4}s`;
            } else if (currentEffect === 'wisp') {
                p.className = 'particle wisp-particle';
                const diam = 6 + Math.random() * 8;
                p.style.width = `${diam}px`;
                p.style.height = `${diam}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.bottom = `-20px`;
                p.style.animationDuration = `${3 + Math.random() * 3}s`;
            }

            container.appendChild(p);

            // Garbage collection
            setTimeout(() => {
                p.remove();
            }, 8000);
        }

        function startSpawning() {
            // Spawn initial seeds
            for (let i = 0; i < 25; i++) {
                createParticle();
            }

            // Continuous rate adjusted by theme intensity
            const rate = (currentEffect === 'rain' || currentEffect === 'snowflake' || currentEffect === 'confetti') ? 40 : 150;
            spawnInterval = setInterval(createParticle, rate);
        }

        // Init
        startSpawning();
    </script>
</body>
</html>
